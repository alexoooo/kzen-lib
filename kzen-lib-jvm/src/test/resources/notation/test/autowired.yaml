

################################################################

AbstractObject:
  abstract: true
  class: tech.kzen.lib.server.objects.autowire.AbstractObject


WeakHolder:
  class: tech.kzen.lib.server.objects.autowire.WeakHolder
  meta:
    locations:
      is: List
      of: ObjectLocation
      by: AutowiredNominal
      for: AbstractObject


AbstractFoo:
  abstract: true
  is: AbstractObject


AbstractBar:
  abstract: true
  is: AbstractObject


################################################################


WeakLiteral:
  class: tech.kzen.lib.server.objects.autowire.WeakHolder
  locations:
    - /AbstractFoo
    - /AbstractBar
  meta:
    locations:
      is: List
      of: ObjectLocation
      by: Nominal


################################################################


ConcreteObject:
  abstract: true
  class: tech.kzen.lib.server.objects.autowire.ConcreteObject


StrongHolder:
  class: tech.kzen.lib.server.objects.autowire.StrongHolder
  meta:
    concreteObjects:
      is: List
      of: ConcreteObject
      by: Autowired


ConcreteFoo:
  is: ConcreteObject


ConcreteBar:
  is: ConcreteObject


################################################################


ObjectGroup:
  is: ChildContainer
  class: tech.kzen.lib.server.objects.autowire.ObjectGroup


ObjectItem:
  abstract: true
  is: ParentPointer
  class: tech.kzen.lib.server.objects.autowire.ObjectItem


ItemFoo:
  is: ObjectItem
  parent: ObjectGroup


ItemBar:
  is: ObjectItem
  parent: ObjectGroup


################################################################

# NestedList auto-wires the objects nested under this object at the given attribute, in document order.
# 'Second' is declared before 'First' on purpose, to prove the order is document position, not name.

NestedHolder:
  class: tech.kzen.lib.server.objects.autowire.NestedHolder
  meta:
    children:
      is: List
      of: ObjectLocation
      by: NestedList

NestedHolder.children/Second:
  is: NestedChild

NestedHolder.children/First:
  is: NestedChild

NestedChild:
  abstract: true
  class: tech.kzen.lib.server.objects.autowire.NestedChild
